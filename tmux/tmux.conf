# Ensure Homebrew path is available for run-shell (TPM, plugins)
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

set-option -sa terminal-overrides ",xterm*:Tc"
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g allow-passthrough on
bind -n S-Enter send-keys Escape '[13;2u'
set -g mouse on
set -g history-limit 50000
set -g detach-on-destroy off

# Smart close: switch to oldest UNATTACHED session before killing current
# (avoids landing on a session already open in another terminal).
# Shared with sesh popup Ctrl-d. See smart-close.sh.
bind X run-shell '~/.config/tmux/smart-close.sh'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Status bar at top
set-option -g status-position top

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Theme
set -g @catppuccin_flavor 'mocha'

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"

# Window style (must be before TPM so catppuccin plugin reads these during init)
set -wg automatic-rename off
set -g automatic-rename-format ''
set -g window-status-separator '|'
set -g status-justify 'absolute-centre'
set -g @catppuccin_window_status_style 'custom'
set -g @catppuccin_window_flags ""
set -g @catppuccin_window_number ""
set -g @catppuccin_window_text "#[fg=#{@thm_rosewater},bg=#{@thm_mantle}] #I#{?#{!=:#{window_name},},: #W ,}"
set -g @catppuccin_window_current_number ""
set -g @catppuccin_window_current_text "#[fg=#{@thm_mantle},bg=#{@thm_peach}] #I#{?#{!=:#{window_name},},: #W ,}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf|harlequin|python)(diff)?(-wrapped)?'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Yank: copy + clear selection but stay in copy mode (don't snap to bottom)
set -g @yank_action 'copy-pipe'

# Resurrect & Continuum (auto-save every 15 min, auto-restore on tmux start)
# set -g @continuum-restore 'on'  # TEMP DISABLED - re-enable after debug
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

run '~/.config/tmux/plugins/tpm/tpm'

# General statusline customisation (must be after TPM loads for @thm_* variables)
set -g status-style 'bg=terminal'

# status left style
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_yellow}] 󰒋 #H "
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_mantle},bold]  #S },#{#[bg=#{@thm_mantle},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "

# status right style
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?IS_RECORDING,#[bg=#{@thm_mantle}#,fg=#{@thm_red}] •Rec #[bg=#{@thm_mantle}#,fg=#{@thm_overlay_0}#,none]│,}"
set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_peach}]#(python3 -c \"import json; d=json.load(open('/tmp/cc_badges.json')); cu=d['clickup_unread']; ca=d['clickup_active']; print(f' 󰄬 {cu}!' if cu else f' 󰄬 {ca}', end='')\" 2>/dev/null) "
set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_red}]#(python3 -c \"import json; d=json.load(open('/tmp/cc_badges.json')); gm=d['gmail_unread']; print(f'󰊫 {gm}!' if gm else '󰊫 0', end='')\" 2>/dev/null) "
set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=#{@thm_mantle}]#[fg=#{@thm_pink}] #(~/.config/tmux/plugins/tmux-battery/scripts/battery_icon.sh) #(~/.config/tmux/plugins/tmux-battery/scripts/battery_percentage.sh) "
set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=#{@thm_mantle}]#{?#(ping -c1 -t2 www.google.com >/dev/null 2>&1 && echo 1),#[fg=#{@thm_mauve}] 󰖩 on ,#[fg=#{@thm_red}] 󰖪 off }"
set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# Continuum auto-save hook (invisible — no output, just triggers the save check)
set -ga status-right "#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)"

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind H split-window -h -c "#{pane_current_path}"
bind V split-window -v -c "#{pane_current_path}"

# Session management
bind s choose-tree -swZ -O time
bind S display-popup -E -w 80% -h 80% "~/.config/tmux/sesh.sh"
bind C-e display-popup -E -w 80% -h 60% "~/bin/tmux-resurrect-pick"
